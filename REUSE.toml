version = 1

# The vendored base graph: Open English WordNet 2025 Plus, ground to WNDB and compressed. A binary
# blob with no place for an inline header; its full provenance is in PROVENANCE.md. CC-BY-4.0 from the
# OEWN team, with the underlying Princeton WordNet grant preserved.
[[annotations]]
path = "base/wndb.tar.zst"
precedence = "aggregate"
SPDX-FileCopyrightText = ["2019-2025 The Open English WordNet Team", "2011 Princeton University"]
SPDX-License-Identifier = "CC-BY-4.0 AND LicenseRef-WordNet"

# The etymology overlay: prose parsed from the English Wiktionary (via kaikki.org wiktextract),
# keyed by WordNet lemma. The prose is the licensable content; CC-BY-SA-3.0, Wiktionary contributors.
[[annotations]]
path = "overlays/etym.onym"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Wiktionary contributors"
SPDX-License-Identifier = "CC-BY-SA-3.0"

# The translations overlay: words from the Open Multilingual Wordnet components, keyed by synset. Each
# component is licensed on its own terms and credited individually; the overlay aggregates the trio in
# the current working set, so its identifier is their conjunction.
[[annotations]]
path = "overlays/omw.onym.zst"
precedence = "aggregate"
SPDX-FileCopyrightText = [
  "2010-2020 MultiWordNet, FBK",
  "2011-2015 Wordnet Bahasa, Francis Bond and others",
  "2010-2020 OpenWN-PT, Alexandre Rademaker and others",
]
SPDX-License-Identifier = "CC-BY-3.0 AND MIT AND CC-BY-SA-3.0"

# Plain-text markers, the machine-written coverage reports, and config that cannot carry, or does not
# warrant, an inline header.
[[annotations]]
path = [
  "base/VERSION",
  "recipes/SOURCES.lock",
  "tests/coverage-report.txt",
  "tests/omw-coverage-report.txt",
  ".gitignore",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 ursa.nz <code@ursa.nz>"
SPDX-License-Identifier = "GPL-3.0-or-later"
